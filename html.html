<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big HTML Example</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
        }
        header {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            background: #555;
            padding: 10px;
        }
        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }
        section {
            padding: 20px;
        }
        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>My Website</h1>
    <p>Welcome to HTML Demo</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<section>
    <h2>About Section</h2>
    <p>This is a paragraph.</p>

    <h3>List Example</h3>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>

    <h3>Table Example</h3>
    <table border="1">
        <tr>
            <th>Name</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>John</td>
            <td>20</td>
        </tr>
    </table>

    <h3>Form Example</h3>
    <form>
        Name: <input type="text"><br><br>
        Email: <input type="email"><br><br>
        Gender:
        <input type="radio" name="g"> Male
        <input type="radio" name="g"> Female <br><br>

        <input type="submit" value="Submit">
    </form>

    <h3>Image</h3>
    <img src="https://via.placeholder.com/150" alt="Sample Image">

    <h3>Link</h3>
    <a href="https://www.google.com">Go to Google</a>
</section>

<footer>
    <p>© 2026 My Website</p>
</footer>

</body>
</html>
